"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#ee99a0)\
[ уұҳ– ](bg:#ee99a0 fg:#1e1e2e)\
$custom\
[оӮҙ](bg:#f5a97f fg:#ee99a0)\
$directory\
[оӮҙ](fg:#f5a97f bg:#394260)\
$git_branch\
$git_status\
[оӮҙ](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#212736 bg:#1d2230)\
$time\
[оӮҙ ](fg:#1d2230)\
\n$character"""

[custom.address]
# м–ҙл–Ө мүҳм—җм„ңл“  bash -cлҘј нҶөн•ҙ м•Ҳм „н•ҳкІҢ IPлҘј к°Җм ёмҳӨлҸ„лЎқ мҲҳм •
command = "bash -c \"hostname -I | awk '{print $1}' || ipconfig getifaddr en0 || hostname\""
when = "true"
style = "bg:#ee99a0 fg:#1e1e2e"
format = "[$output ]($style)"

[directory]
style = "fg:#1e1e2e bg:#f5a97f"
format = "[ $path ]($style)"
truncation_length = 5
truncate_to_repo = false
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#f5a97f bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#f5a97f bg:#394260)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#f5a97f bg:#212736)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#f5a97f bg:#212736)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#f5a97f bg:#212736)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#f5a97f bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'
